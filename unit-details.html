<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل الاستراحة | منتجعات ماربيلا</title>
  <meta name="description" content="تفاصيل ومواصفات استراحات ماربيلا — معرض صور، تقويم حجز، خريطة الموقع، ومراجعات." />
  <meta name="theme-color" content="#15242B" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script>(function(){try{var t=localStorage.getItem('marbella_theme');if(t==='dark')document.documentElement.classList.add('theme-dark');}catch(e){}})();</script>
</head>
<body id="top">
  <a class="skip-link" href="#detail-section">تخطّى إلى المحتوى</a>

  <div class="topbar">
    <div class="container topbar-inner">
      <span class="topbar-area"><i class="fa-solid fa-location-dot" aria-hidden="true"></i> <span id="areaName"></span></span>
      <div class="social">
        <a id="link-instagram" href="#" target="_blank" rel="noopener" aria-label="انستغرام"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>
        <a id="link-tiktok" href="#" target="_blank" rel="noopener" aria-label="تيك توك"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
        <a id="link-whatsapp" href="#" target="_blank" rel="noopener" aria-label="واتساب"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i></a>
      </div>
    </div>
  </div>

  <header class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html" aria-label="منتجعات ماربيلا - الرئيسية">
        <img src="assets/images/logo.png" alt="شعار منتجعات ماربيلا" class="logo" width="52" height="52" />
        <span class="brand-text"><h1 id="brandName"></h1><small>استراحات ومجالس للإيجار اليومي</small></span>
      </a>
      <nav class="nav-links" id="nav-links" aria-label="التنقل الرئيسي">
        <a href="about.html">من نحن</a>
        <a href="index.html#units-section">الاستراحات</a>
        <a href="faq.html">الأسئلة الشائعة</a>
        <a href="cancellation-policy.html">سياسة الإلغاء</a>
        <a href="index.html#map-section">الموقع</a>
      </nav>
      <a id="cta-whatsapp" class="btn btn-wa" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i> احجز الآن</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="تبديل الوضع الداكن" title="الوضع الداكن"><i class="fa-solid fa-moon"></i></button>
      <button class="nav-toggle" id="nav-toggle" aria-label="القائمة" aria-expanded="false"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
    </div>
  </header>

  <main class="container" id="detail-section" style="padding:2rem 0 3rem">
    <a href="index.html" class="back-link" style="display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-weight:600;margin-bottom:1rem"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i> العودة للاستراحات</a>
    <div id="detail-content"></div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <h3 id="footerBrand"></h3>
        <p>للحجز والاستفسار: <span id="footerPhone"></span></p>
      </div>
      <div class="footer-social">
        <a id="footer-instagram" href="#" target="_blank" rel="noopener" aria-label="انستغرام"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a>
        <a id="footer-tiktok" href="#" target="_blank" rel="noopener" aria-label="تيك توك"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
        <a id="footer-whatsapp" href="#" target="_blank" rel="noopener" aria-label="واتساب"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i></a>
      </div>
    </div>
    <p class="copyright">© <span id="year"></span> منتجعات ماربيلا — جميع الحقوق محفوظة</p>
  </footer>

  <a id="float-whatsapp" class="float-wa" href="#" target="_blank" rel="noopener" aria-label="تواصل عبر واتساب"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i></a>

  <script src="js/data.js"></script>
  <script src="js/shared.js"></script>
  <script>
    // ربط الإعدادات + شريط التنقل + قائمة الجوال (الكشف يُهيّأ بعد حقن المحتوى)
    const $=id=>document.getElementById(id);

    // قراءة معرّف الاستراحة من الرابط
    const params=new URLSearchParams(location.search);
    const id=params.get("id");
    const unit=UNITS.find(u=>u.id===id)||UNITS[0];

    const features=unit.features.map(f=>`<span class="chip"><i class="fa-solid fa-check" aria-hidden="true"></i>${f}</span>`).join("");
    const gallery=unit.images.map((src,i)=>`<figure class="dg-thumb"><img src="${src}" alt="صورة ${unit.name} ${i+1}" loading="lazy" data-idx="${i}"/></figure>`).join("");
    const similar=UNITS.filter(u=>u.id!==unit.id).map(u=>`
      <a class="sim-card" href="unit-details.html?id=${u.id}">
        <img src="${u.images[0]}" alt="${u.name}" loading="lazy" width="200" height="140"/>
        <span class="sim-name">${u.name}</span>
        <span class="sim-price">${u.price} ${u.currency}</span>
      </a>`).join("");

    $("detail-content").innerHTML=`
      <div class="detail-grid">
        <div class="detail-main">
          <div class="detail-gallery reveal">
            <figure class="dg-main"><img src="${unit.images[0]}" alt="${unit.name}" id="dg-main-img" data-idx="0"/></figure>
            <div class="dg-thumbs">${gallery}</div>
          </div>
          <div class="detail-specs reveal" data-delay="1">
            <h2>${unit.name}</h2>
            <p class="unit-tag">${unit.tagline}</p>
            <div class="unit-features">${features}</div>
            <table class="specs-table">
              <tr><td><i class="fa-solid fa-users" aria-hidden="true"></i> السعة</td><td>${unit.capacity}</td></tr>
              <tr><td><i class="fa-solid fa-bed" aria-hidden="true"></i> غرف النوم</td><td>${unit.beds}</td></tr>
              <tr><td><i class="fa-solid fa-bath" aria-hidden="true"></i> دورات المياه</td><td>${unit.baths}</td></tr>
            </table>
          </div>
          <div class="detail-map reveal" data-delay="2">
            <h3>الموقع</h3>
            <div class="map-wrap" style="height:320px"><iframe src="https://www.google.com/maps?q=${unit.lat},${unit.lng}&z=15&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="خريطة ${unit.name}"></iframe></div>
          </div>
        </div>
        <aside class="detail-side reveal" data-delay="1">
          <div class="booking-card">
            <div class="bc-price">${unit.price} <small>${unit.currency} / الليلة</small></div>
            <button class="btn btn-wa btn-full" id="book-this"><i class="fa-solid fa-calendar-check" aria-hidden="true"></i> احجز هذه الاستراحة</button>
            <a class="btn btn-outline btn-full" href="https://www.google.com/maps?q=${unit.lat},${unit.lng}&z=15" target="_blank" rel="noopener"><i class="fa-solid fa-location-dot" aria-hidden="true"></i> الاتجاهات</a>
          </div>
          <div class="reviews-card" id="reviews-card">
            <h3>تقييم الضيوف</h3>
            <div id="reviews-display"></div>
            <form id="review-form" class="review-form" novalidate>
              <h4>أضف تقييمك</h4>
              <div class="rf-stars" role="radiogroup" aria-label="التقييم">
                ${[5,4,3,2,1].map(n=>`<input type="radio" name="rev-rating" id="r${n}" value="${n}"><label for="r${n}" aria-label="${n} نجوم"><i class="fa-solid fa-star"></i></label>`).join("")}
              </div>
              <input id="rev-name" type="text" placeholder="اسمك" autocomplete="name" />
              <textarea id="rev-text" rows="2" placeholder="اكتب تعليقك..."></textarea>
              <small class="rf-error" id="rf-error" role="alert"></small>
              <button type="submit" class="a-btn" style="background:var(--brass);color:var(--night)"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i> إرسال التقييم</button>
            </form>
          </div>
        </aside>
      </div>
      <section class="similar reveal">
        <h3>استراحات مشابهة</h3>
        <div class="sim-grid">${similar}</div>
      </section>`;

    // تبديل الصورة الرئيسية + Lightbox المشترك
    const mainImg=$("dg-main-img");
    document.querySelectorAll(".dg-thumb img").forEach(th=>{
      th.addEventListener("click",()=>{ mainImg.src=th.src; mainImg.dataset.idx=th.dataset.idx; });
    });
    mainImg.addEventListener("click",()=>{
      openLightbox(unit.images, parseInt(mainImg.dataset.idx,10)||0);
    });
    mainImg.style.cursor="zoom-in";

    // زر الحجز يوجّه للصفحة الرئيسية مع تمرير للاستراحة
    $("book-this").addEventListener("click",()=>{
      location.href=`index.html?book=${unit.id}#units-section`;
    });

    // الآن بعد حقن المحتوى: ربط الإعدادات + شريط التنقل + كشف عناصر .reveal المُحقنة
    initShell();

    // ===== نظام التقييمات =====
    const store = window.MarbellaStore;
    function renderReviews(){
      const wrap = $("reviews-display");
      if(!wrap || !store) return;
      const reviews = store.getReviews(unit.id);
      const avg = store.avgRating(unit.id);
      const avgStr = avg ? avg.toFixed(1) : "—";
      const stars = avg ? "★".repeat(Math.round(avg)) + "☆".repeat(5-Math.round(avg)) : "★★★★★";
      let html = `<div class="rating"><span class="stars">${stars}</span> ${avgStr} / 5 <small>(${reviews.length} تقييم)</small></div>`;
      if(reviews.length){
        html += `<div class="rev-list">${reviews.slice().reverse().map(r=>{
          const s = "★".repeat(r.rating)+"☆".repeat(5-r.rating);
          return `<div class="rev-item"><div class="rev-stars">${s}</div><p>${r.text}</p><small>— ${r.name}</small></div>`;
        }).join("")}</div>`;
      } else {
        html += `<p class="rev-empty">لا توجد تقييمات بعد. كن أول من يقيّم!</p>`;
      }
      wrap.innerHTML = html;
    }
    renderReviews();

    // نموذج التقييم
    const rf = $("review-form");
    const rfErr = $("rf-error");
    rf.addEventListener("submit",e=>{
      e.preventDefault();
      const rating = parseInt(rf.querySelector("input[name=rev-rating]:checked")?.value,10);
      const name = $("rev-name").value.trim();
      const text = $("rev-text").value.trim();
      rfErr.textContent = "";
      if(!rating){ rfErr.textContent="اختر تقييماً من 1 إلى 5 نجوم"; return; }
      if(!name){ rfErr.textContent="اكتب اسمك"; return; }
      if(text.length<5){ rfErr.textContent="اكتب تعليقاً لا يقل عن 5 أحرف"; return; }
      store.addReview(unit.id, {name, rating, text});
      rf.reset();
      renderReviews();
      rfErr.style.color="var(--palm)";
      rfErr.textContent="شكراً! تم نشر تقييمك";
      setTimeout(()=>{ rfErr.textContent=""; rfErr.style.color=""; }, 3000);
    });
  </script>
</body>
</html>
